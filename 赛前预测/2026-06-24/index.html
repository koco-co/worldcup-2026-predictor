<script>
(function(){
  "use strict";
  // theme
  var root=document.documentElement, KEY="fb-theme";
  try{var saved=localStorage.getItem(KEY); if(saved) root.setAttribute("data-theme",saved);}catch(e){}
  document.getElementById("themeBtn").addEventListener("click",function(){
    var next=root.getAttribute("data-theme")==="dark"?"light":"dark";
    root.setAttribute("data-theme",next);
    try{localStorage.setItem(KEY,next);}catch(e){}
  });

  var DATA=[];
  try{DATA=JSON.parse(document.getElementById("report-data").textContent||"[]");}catch(e){DATA=[];}
  if(window.marked&&marked.setOptions){marked.setOptions({gfm:true,breaks:false});}

  var cards=document.getElementById("cards");
  document.getElementById("mc").textContent=DATA.length;

  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function confClass(c){c=String(c||"");if(/高/.test(c))return"good";if(/中/.test(c))return"warn";if(/低/.test(c))return"cool";return"";}

  function chip(label,val,extra){
    if(!val)return"";
    extra=extra||"";
    var dot=/good|warn|cool/.test(extra)?'<span class="dotc"></span>':"";
    return '<span class="chip '+extra+'">'+dot+(label?'<span class="lbl">'+esc(label)+'</span> ':'')+'<b>'+esc(val)+'</b></span>';
  }

  // ---------- chart helpers ----------
  function num(n,d){if(n==null||n===""||isNaN(n))return"";var s=(+n).toFixed(d==null?0:d);return d?s.replace(/\.?0+$/,""):s;}
  // 票面专用：赔率保留尾零（<10 三位、≥10 两位）；金额千分位 + 两位小数
  function fmtO(o){if(o==null||o===""||isNaN(o))return"";return (+o).toFixed(+o>=10?2:3);}
  function fmtM(v){if(v==null||v===""||isNaN(v))return"";var s=(+v).toFixed(2),p=s.split(".");return p[0].replace(/\B(?=(\d{3})+(?!\d))/g,",")+"."+p[1];}
  function norm3(a){if(!a||a.length<3)return null;var t=(+a[0]||0)+(+a[1]||0)+(+a[2]||0);if(t<=0)return null;return [a[0]/t*100,a[1]/t*100,a[2]/t*100];}
  function wbar(a,ghost){var n=norm3(a);if(!n)return"";return '<div class="wbar'+(ghost?" ghost":"")+'"><i class="s-h" style="width:'+n[0].toFixed(1)+'%"></i><i class="s-d" style="width:'+n[1].toFixed(1)+'%"></i><i class="s-a" style="width:'+n[2].toFixed(1)+'%"></i></div>';}
  function renderWDL(c){
    var w=c.wdl;if(!w)return"";var q=norm3(w.qual);if(!q)return"";
    var home=esc(w.home||"主胜"),away=esc(w.away||"客胜");
    var src=c.odds_time?'<span class="src">'+esc(c.odds_time)+'</span>':"";
    var legend='<div class="wdl-legend"><span class="l-h">'+home+'<b>'+q[0].toFixed(0)+'%</b></span><span class="l-d">平<b>'+q[1].toFixed(0)+'%</b></span><span class="l-a">'+away+'<b>'+q[2].toFixed(0)+'%</b></span></div>';
    var bars='<div class="wrow-lab">分析师定性</div>'+wbar(w.qual,false);
    if(norm3(w.odds)){bars+='<div class="wrow-lab">市场赔率隐含</div>'+wbar(w.odds,true);}
    var xg="";if(c.xg&&c.xg.length>=2){xg='<div class="xg"><span class="t">预期进球</span><span class="v">'+num(c.xg[0],2)+'</span><span class="sep">:</span><span class="v">'+num(c.xg[1],2)+'</span></div>';}
    return '<div class="d-sec"><div class="d-h">胜平负概率 '+src+'</div>'+legend+bars+xg+'</div>';
  }
  function renderScores(c){
    var s=c.score_top;if(!s||!s.length)return"";var mx=Math.max.apply(null,s.map(function(x){return +x.p||0;}))||1;
    var rows=s.map(function(x){var w=((+x.p||0)/mx*100).toFixed(0);return '<div class="srow'+(x.pick?" pick":"")+'"><span class="sc">'+esc(x.s)+'</span><span class="track"><i style="width:'+w+'%"></i></span><span class="pp">'+num(x.p,1)+'%</span></div>';}).join("");
    return '<div class="d-sec"><div class="d-h">Top 比分</div><div class="scores">'+rows+'</div></div>';
  }
  function renderTTG(c){
    var t=c.ttg;if(!t||!t.length)return"";var mx=Math.max.apply(null,t.map(function(v){return +v||0;}))||1;var top=-1,tv=-1;
    t.forEach(function(v,i){if((+v||0)>tv){tv=+v||0;top=i;}});
    var labels=["0","1","2","3","4","5","6","7+"];
    var cols=t.map(function(v,i){var h=Math.max((+v||0)/mx*100,2).toFixed(0);return '<div class="col'+(i===top?" top":"")+'"><span class="cv">'+num(v,0)+'</span><span class="bar" style="height:'+h+'%"></span><span class="cl">'+(labels[i]||i)+'</span></div>';}).join("");
    return '<div class="d-sec"><div class="d-h">总进球分布（竞彩 0–7+）</div><div class="ttg">'+cols+'</div></div>';
  }
  function renderHHAD(c){
    var h=c.hhad;if(!h||!norm3(h.probs))return"";var n=norm3(h.probs);
    var legend='<div class="wdl-legend"><span class="l-h">让胜<b>'+n[0].toFixed(0)+'%</b></span><span class="l-d">让平<b>'+n[1].toFixed(0)+'%</b></span><span class="l-a">让负<b>'+n[2].toFixed(0)+'%</b></span></div>';
    return '<div class="d-sec"><div class="d-h">让球后倾向 <span class="src">'+esc(h.line||"")+'</span></div>'+legend+wbar(h.probs,false)+'</div>';
  }
  function renderPlans(c){
    var p=c.plans;if(!p||!p.length)return"";
    var rows=p.map(function(x){
      var rec=/推荐/.test(x.tag||"");
      var tag=rec?'<span class="ptag">推荐</span>':"";
      var max=x.max!=null?'<div class="pmax">'+num(x.max,1)+'¥<small>理论最高</small></div>':'<div class="pmax"></div>';
      var cover=x.cover?'<span class="pcover">'+esc(x.cover)+'</span>':'<span></span>';
      var sub=esc(x.play||"")+(x.odds!=null?" · @"+num(x.odds,2):"")+(x.stake!=null?" · 投 "+num(x.stake,0)+"¥":"")+(x.note?" · "+esc(x.note):"");
      return '<div class="plan'+(rec?" rec":"")+'"><span class="pn">'+esc(x.name||"方案")+tag+'</span>'+cover+max+'<span class="pplay">'+sub+'</span></div>';
    }).join("");
    return '<div class="d-plans"><div class="d-h">单场押注方案</div><div class="plans">'+rows+'</div></div>';
  }
  function renderDash(c){
    if(!c)return"";
    var grid=renderWDL(c)+renderScores(c)+renderTTG(c)+renderHHAD(c);
    var plans=renderPlans(c);
    if(!grid&&!plans)return"";
    return '<div class="dash">'+(grid?'<div class="dash-grid">'+grid+'</div>':"")+plans+'</div>';
  }
  function renderCombo(cb){
    if(!cb||!cb.combos||!cb.combos.length)return"";
    var meta=[];if(cb.stake_total!=null)meta.push("本金 "+num(cb.stake_total,0)+"¥");meta.push("体彩竞彩 · 比分串关");if(cb.odds_time)meta.push(esc(cb.odds_time));
    var cards=cb.combos.map(function(c){
      var rec=/推荐/.test(c.tag||"");
      var isTicket=!!(c.legs&&c.legs[0]&&c.legs[0].scores);
      var body;
      if(isTicket){
        var wayRow='<div class="ticket-way"><span class="tw-mode">过关方式 '+esc(c.way||"")+'</span>'
          +(c.mult!=null?'<span class="tw-mult">'+num(c.mult,0)+'倍</span>':"")
          +(c.stake!=null?'<span class="tw-total">合计 <b>'+num(c.stake,0)+'</b> 元</span>':"")+'</div>';
        var legs=c.legs.map(function(l){
          var no=l.no!=null?'<span class="tl-no">第'+esc(""+l.no)+'场</span>':"";
          var id=(l.id!=null&&l.id!=="")?'<span class="tl-id">'+esc(""+l.id)+'</span>':"";
          var matchTxt=(l.home!=null||l.away!=null)
            ?'<span class="tl-match">'+esc(l.home||"")+'<i>Vs</i>'+esc(l.away||"")+'</span>'
            :(l.match?'<span class="tl-match">'+esc(l.match)+'</span>':"");
          var scores=(l.scores||[]).map(function(s){
            return '<span class="ts">'+esc(s.s||"")+(s.o!=null?'<b>@'+fmtO(s.o)+'</b>':"")+'</span>';
          }).join("");
          return '<div class="tleg"><div class="tl-head">'+no+id+matchTxt+'</div>'+(scores?'<div class="tl-scores">'+scores+'</div>':"")+'</div>';
        }).join("");
        var betsTxt=c.bets!=null?'单倍注数 '+esc(c.way||"")+'×'+num(c.bets,0)+'注 · 共'+num(c.bets,0)+'注':"";
        var foot='<div class="ticket-foot"><div class="tf-bets">'+betsTxt+'</div>'
          +(c.max!=null&&+c.max>0?'<div class="tf-max"><span class="ml">本票最高可能固定奖金</span><span class="mv">'+fmtM(c.max)+' 元</span></div>':'<div class="tf-max"></div>')+'</div>';
        body=wayRow+'<div class="ticket-legs">'+legs+'</div>'+foot;
      }else{
        var legs2=(c.legs||[]).map(function(l){
          if(typeof l==="string")return '<div class="leg"><span class="lp">'+esc(l)+'</span></div>';
          var sel=l.sel?'<span class="sel">'+esc(l.sel)+'</span>':"";
          var odds=l.odds!=null?'<span class="lo">@'+num(l.odds,2)+'</span>':'<span class="lo"></span>';
          return '<div class="leg"><span class="lm">'+esc(l.match||"")+'</span>'+odds+'<span class="lp">'+esc(l.play||"")+(sel?" · ":"")+sel+'</span></div>';
        }).join("");
        var maxv=(c.max!=null&&+c.max>0)?'<div class="max"><div class="mv">'+num(c.max,1)+'¥</div><div class="ml">理论最高奖金</div></div>':'<div class="max"></div>';
        var stake=c.stake!=null?'<span class="stake">投入 <b>'+num(c.stake,0)+'¥</b>'+(c.bets&&c.bets>1?" · "+c.bets+"注":"")+'</span>':'<span class="stake"></span>';
        body='<div class="combo-legs">'+legs2+'</div><div class="combo-foot">'+stake+maxv+'</div>';
      }
      var note=(c.hit||c.risk)?'<div class="combo-note">'+(c.hit?"命中："+esc(c.hit):"")+(c.risk?' <span class="risk">· '+esc(c.risk)+'</span>':"")+'</div>':"";
      return '<div class="combo'+(rec?" rec":"")+'"><div class="combo-h"><span class="cw">'+esc(c.name||c.way||"方案")+'</span>'+(rec?'<span class="crec">推荐</span>':"")+'</div>'+body+note+'</div>';
    }).join("");
    var more=cb._body?'<div class="pin-more"><button class="pin-toggle" type="button">展开完整串关分析 ▾</button></div><div class="pin-doc" style="display:none"><div class="report report-doc"></div></div>':"";
    return '<div class="pin-card"><div class="pin-top"><div class="pt-title"><span class="star">★</span>综合推荐 · 比分串关金字塔</div><div class="pt-meta">'+meta.join(" · ")+'</div></div><div class="pin-body">'+cards+'</div>'+more+'<div class="pin-disc">本票最高可能固定奖金按官方赔率计算，为命中所选比分时的上限、非保证；串关任一场不中整串作废。仅供研究参考，不构成投注建议。</div></div>';
  }
  function wrapTables(scope){scope.querySelectorAll("table").forEach(function(t){if(t.parentElement.classList.contains("tw"))return;var w=document.createElement("div");w.className="tw";t.parentNode.insertBefore(w,t);w.appendChild(t);});}

  // ---------- foldable headings (Typora-style) + ids for the outline ----------
  var TRI='<span class="fold-tri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>';
  function foldify(root,prefix){
    var els=Array.prototype.slice.call(root.children);
    if(!els.length)return;
    root.innerHTML="";
    var frag=document.createDocumentFragment();
    var stack=[{lv:0,content:frag}], n=0;
    els.forEach(function(el){
      var m=/^H([1-4])$/.exec(el.tagName);
      if(m){
        var lv=+m[1];
        while(stack.length>1&&stack[stack.length-1].lv>=lv)stack.pop();
        el.id=prefix+"h"+(n++);
        el.classList.add("foldable");
        el.insertAdjacentHTML("afterbegin",TRI);
        var sec=document.createElement("section");sec.className="sec";
        var content=document.createElement("div");content.className="sec-content";
        sec.appendChild(el);sec.appendChild(content);
        stack[stack.length-1].content.appendChild(sec);
        (function(s,h){h.addEventListener("click",function(ev){
          if(ev.target.closest("a"))return;
          var sel=window.getSelection&&window.getSelection();
          if(sel&&String(sel).length>0)return;
          s.classList.toggle("folded");
        });})(sec,el);
        stack.push({lv:lv,content:content});
      }else{
        stack[stack.length-1].content.appendChild(el);
      }
    });
    root.appendChild(frag);
  }
  // global outline: one IntersectionObserver highlights the active section, fed as cards render
  var olLinkById={};
  var olObserver=("IntersectionObserver" in window)?new IntersectionObserver(function(ents){
    ents.forEach(function(en){
      if(!en.isIntersecting)return;
      var a=olLinkById[en.target.id];if(!a)return;
      var prev=document.querySelector(".ol-link.active");if(prev)prev.classList.remove("active");
      a.classList.add("active");
      var g=a.closest(".ol-group");if(g)g.classList.add("open");
    });
  },{rootMargin:"-10px 0px -80% 0px",threshold:0}):null;
  function observeHeadings(root){
    if(!olObserver)return;
    Array.prototype.forEach.call(root.querySelectorAll("h1,h2,h3,h4"),function(h){if(h.id)olObserver.observe(h);});
  }
  function mdHeadings(md){
    if(!md)return [];
    var out=[],fence=false;
    String(md).split(/\r?\n/).forEach(function(ln){
      if(/^\s*(```|~~~)/.test(ln)){fence=!fence;return;}
      if(fence)return;
      var m=/^(#{1,4})\s+(.+?)\s*#*\s*$/.exec(ln);
      if(m)out.push({lv:m[1].length,text:m[2].replace(/[*`_]/g,"").trim()});
    });
    return out;
  }

  // ---------- pinned combo card ----------
  var COMBO=null;
  try{var _ce=document.getElementById("combo-data");if(_ce){COMBO=JSON.parse(_ce.textContent||"null");}}catch(e){COMBO=null;}
  var pinEl=document.getElementById("pin");
  var comboApi=null;
  if(pinEl){
    var _ch=renderCombo(COMBO);
    if(_ch){
      pinEl.innerHTML=_ch;
      var ptog=pinEl.querySelector(".pin-toggle"),pdoc=pinEl.querySelector(".pin-doc");
      if(ptog&&pdoc&&COMBO&&COMBO._body){
        var comboRender=function(){
          if(pdoc.dataset.r)return;
          pdoc.dataset.r="1";
          var rep=pdoc.querySelector(".report");
          rep.innerHTML=window.marked?marked.parse(COMBO._body||""):'<pre>'+esc(COMBO._body||"")+'</pre>';
          wrapTables(rep);foldify(rep,"cb");observeHeadings(rep);
        };
        comboApi={el:pinEl,ensureOpen:function(){comboRender();pdoc.style.display="block";ptog.textContent="收起串关分析 ▴";return pinEl;}};
        ptog.addEventListener("click",function(){
          var open=pdoc.style.display==="none";
          if(open)comboRender();
          pdoc.style.display=open?"block":"none";
          ptog.textContent=open?"收起串关分析 ▴":"展开完整串关分析 ▾";
        });
      }
    }else{pinEl.style.display="none";}
  }

  var cardApi=[];
  if(DATA.length){
    DATA.forEach(function(r,i){
      var el=document.createElement("article");
      el.className="card"; el.style.setProperty("--i",i); el.id="card"+i;
      var parts=String(r.match||r.file||"比赛").split(/\s+vs\s+/i);
      var title=parts.length===2?esc(parts[0])+'<span class="vs">vs</span>'+esc(parts[1]):esc(r.match||r.file);
      var chips=
        chip("胜负",r.result,confClass(r.confidence)?"":"")+
        chip("置信",r.confidence,confClass(r.confidence))+
        chip("比分",r.score,"num")+
        chip("",r.recommend?("推荐 "+r.recommend):"","rec");
      el.innerHTML=
        '<div class="head">'+
          '<div class="head-top">'+
            (r.league?'<span class="league">'+esc(r.league)+'</span>':'')+
            (r.kickoff?'<span class="kick">'+esc(r.kickoff)+'</span>':'')+
            '<span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>'+
          '</div>'+
          '<div class="match">'+title+'</div>'+
          '<div class="chips">'+chips+'</div>'+
        '</div>'+
        '<div class="body"><div class="body-inner"><div class="expand"></div></div></div>';
      var head=el.querySelector(".head"), expand=el.querySelector(".expand"), rendered=false;
      function render(){
        if(rendered)return; rendered=true;
        expand.innerHTML=renderDash(r.chart)+'<div class="report report-doc"></div>';
        var rep=expand.querySelector(".report");
        rep.innerHTML=window.marked?marked.parse(r.body||""):'<pre>'+esc(r.body||"")+'</pre>';
        wrapTables(rep);foldify(rep,"c"+i);observeHeadings(rep);
      }
      head.addEventListener("click",function(){el.classList.toggle("open");if(el.classList.contains("open"))render();});
      cardApi[i]={el:el,ensureOpen:function(){render();el.classList.add("open");return el;}};
      cards.appendChild(el);
    });
  }else{
    cards.innerHTML='<div class="empty"><div class="big">当天暂无报告</div><div>生成某场比赛的 md 报告后，重新运行脚本即可。</div></div>';
  }

  // ---------- global outline sidebar (two-level: match → sections) ----------
  function gotoHeading(hid){var h=document.getElementById(hid);if(!h)return;var s=h.closest(".sec");while(s){s.classList.remove("folded");var p=s.parentElement;s=p?p.closest(".sec"):null;}h.scrollIntoView({behavior:"smooth",block:"start"});}
  function collapseOutline(c){document.body.classList[c?"add":"remove"]("ol-collapsed");}
  (function buildOutline(){
    var tree=document.getElementById("olTree"), outline=document.getElementById("outline");
    if(!tree)return;
    var groups=[];
    if(comboApi)groups.push({kind:"combo",label:"综合推荐 · 跨场串关",md:COMBO._body,prefix:"cb"});
    DATA.forEach(function(r,i){groups.push({kind:"match",idx:i,label:String(r.match||r.file||"比赛"),md:r.body,prefix:"c"+i});});
    if(!groups.length){if(outline)outline.style.display="none";document.body.classList.add("ol-collapsed");return;}
    var html="";
    groups.forEach(function(g,gi){
      var subs=mdHeadings(g.md).map(function(h,j){
        return '<a class="ol-link ol-sub lv'+h.lv+'" data-g="'+gi+'" data-h="'+g.prefix+'h'+j+'">'+esc(h.text)+'</a>';
      }).join("");
      var tw=subs?'<button class="ol-tw" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>':'<span class="ol-tw empty"></span>';
      html+='<div class="ol-group open" data-g="'+gi+'"><div class="ol-row">'+tw+'<a class="ol-link ol-mlink" data-g="'+gi+'">'+esc(g.label)+'</a></div><div class="ol-subs">'+subs+'</div></div>';
    });
    tree.innerHTML=html;
    Array.prototype.forEach.call(tree.querySelectorAll(".ol-sub"),function(a){olLinkById[a.getAttribute("data-h")]=a;});
    function openGroup(gi){var g=groups[gi];if(!g)return null;if(g.kind==="combo"&&comboApi)return comboApi.ensureOpen();if(g.kind==="match"&&cardApi[g.idx])return cardApi[g.idx].ensureOpen();return null;}
    Array.prototype.forEach.call(tree.querySelectorAll(".ol-tw"),function(b){
      if(b.classList.contains("empty"))return;
      b.addEventListener("click",function(e){e.stopPropagation();b.closest(".ol-group").classList.toggle("open");});
    });
    Array.prototype.forEach.call(tree.querySelectorAll(".ol-mlink"),function(a){
      a.addEventListener("click",function(){var t=openGroup(+a.getAttribute("data-g"));if(t)setTimeout(function(){t.scrollIntoView({behavior:"smooth",block:"start"});},40);if(window.innerWidth<=900)collapseOutline(true);});
    });
    Array.prototype.forEach.call(tree.querySelectorAll(".ol-sub"),function(a){
      a.addEventListener("click",function(){openGroup(+a.getAttribute("data-g"));var hid=a.getAttribute("data-h");setTimeout(function(){gotoHeading(hid);},40);if(window.innerWidth<=900)collapseOutline(true);});
    });
  })();
  (function(){
    var x=document.getElementById("olX"),fab=document.getElementById("olFab");
    if(x)x.addEventListener("click",function(){collapseOutline(true);});
    if(fab)fab.addEventListener("click",function(){collapseOutline(false);});
    if(window.innerWidth<=900)collapseOutline(true);
  })();
})();
</script>
<script>
/* ===== 赛事大标题 + 净盈亏按钮 + 赛程/战绩弹窗 ===== */
(function(){
  "use strict";
  function $(id){return document.getElementById(id);}
  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function parse(id){try{var e=$(id);if(!e)return null;return JSON.parse(e.textContent||"null");}catch(e){return null;}}
  function pad(n){return (n<10?"0":"")+n;}
  function fmtAmt(v){if(v==null||v===""||isNaN(v))return"—";var s=(+v).toFixed(2),p=s.split(".");return p[0].replace(/\B(?=(\d{3})+(?!\d))/g,",")+"."+p[1];}
  function fmtSigned(v){if(v==null||isNaN(v))return"—";return (v<0?"−":v>0?"+":"")+fmtAmt(Math.abs(v));}
  function fmtOdds(o){if(o==null||isNaN(o))return"";var s=(+o).toFixed(2);if(s.charAt(s.length-1)==="0")s=s.slice(0,-1);return s;}
  var WK=["周日","周一","周二","周三","周四","周五","周六"];
  function weekday(y,mo,d){return WK[new Date(Date.UTC(y,mo-1,d)).getUTCDay()];}

  var TOUR=parse("tournament-data"), LED=parse("ledger-data");

  /* ---------- 共享弹窗开合 ---------- */
  function openModal(m){if(!m)return;m.classList.add("open");m.setAttribute("aria-hidden","false");document.body.classList.add("modal-lock");}
  function closeModal(m){if(!m)return;m.classList.remove("open");m.setAttribute("aria-hidden","true");if(!document.querySelector(".modal.open"))document.body.classList.remove("modal-lock");}
  document.addEventListener("click",function(e){var c=e.target.closest&&e.target.closest("[data-close]");if(c){var m=c.closest(".modal");if(m){e.preventDefault();closeModal(m);}}});
  document.addEventListener("keydown",function(e){if(e.key==="Escape"){var m=document.querySelector(".modal.open");if(m)closeModal(m);}});

  /* ---------- 北京时间换算（按城市/国家定时区） ---------- */
  var PT=["Inglewood","Santa Clara","Seattle","Vancouver","Los Angeles","San Francisco"];
  function bjOffset(city,country){
    if(country&&/Mex/i.test(country))return 14;            // 墨西哥 UTC-6（不夏令时）
    city=city||"";
    for(var i=0;i<PT.length;i++)if(city.indexOf(PT[i])>=0)return 15; // 太平洋 PDT UTC-7
    if(/Kansas City|Arlington|Dallas|Houston/.test(city))return 13;  // 中部 CDT UTC-5
    return 12;                                              // 东部 EDT UTC-4（默认）
  }
  function toBJ(dateStr,hm,off){
    if(!dateStr)return null;var p=dateStr.split("-").map(Number);if(!p[0])return null;
    var t=(hm||"").split(":").map(Number),h=isNaN(t[0])?0:t[0],mi=isNaN(t[1])?0:t[1];
    var d=new Date(Date.UTC(p[0],p[1]-1,p[2],h+off,mi));
    return {y:d.getUTCFullYear(),mo:d.getUTCMonth()+1,d:d.getUTCDate(),h:d.getUTCHours(),mi:d.getUTCMinutes(),hasTime:!!hm};
  }

  /* ---------- 赛事大标题 + 赛程弹窗 ---------- */
  var schBtn=$("tourneyBtn"), schModal=$("schModal");
  if(TOUR){
    if(TOUR.name_zh)$("tourneyName").textContent=TOUR.name_zh.replace(/^2026年?/,"2026 ");
    if(TOUR.start&&TOUR.end){
      var a=TOUR.start.split("-"),b=TOUR.end.split("-");
      var hosts=(TOUR.hosts||[]).map(function(h){return h.replace(/(美国|美利坚)/,"美").replace("加拿大","加").replace("墨西哥","墨");}).join(" / ");
      $("tourneyDates").textContent=a[0]+"."+a[1]+"."+a[2]+" — "+b[1]+"."+b[2]+(hosts?(" · "+hosts):"");
    }
    var schedule=(TOUR.schedule||[]).slice();
    var venueMap={};(TOUR.venues||[]).forEach(function(v){venueMap[v.stadium_en]={s:v.stadium_zh,c:v.city_zh};});
    var pageDate=(function(){var t=document.querySelector(".date");var m=t?/\d{4}-\d{2}-\d{2}/.exec(t.textContent||""):null;return m?m[0]:"";})();

    var STAGE_LABEL={r32:"32 强淘汰赛",r16:"16 强",qf:"8 强",sf:"半决赛",third:"季军赛",final:"决赛"};
    var KO=["r32","r16","qf","sf","third","final"], GROUPS=["A","B","C","D","E","F","G","H","I","J","K","L"];
    function bjOf(m){return toBJ(m.date,m.time_local,bjOffset(m.city,m.country));}
    function bjKey(m){var b=bjOf(m);return b?(b.y*1e8+b.mo*1e6+b.d*1e4+b.h*100+b.mi):0;}
    function venueTxt(m){var v=venueMap[m.venue_en];var s=v?v.s:(m.venue_en||""),c=v?v.c:(m.city||"");return c?(s+" · "+c):s;}

    function matchRow(m){
      var b=bjOf(m), wd=b?(pad(b.mo)+"-"+pad(b.d)):"待定", wt=b&&b.hasTime?(pad(b.h)+":"+pad(b.mi)):"待定";
      var today=(b&&pageDate&&(b.y+"-"+pad(b.mo)+"-"+pad(b.d))===pageDate);
      var live=m.status==="live";
      var teams='<span>'+esc(m.home_zh||m.home_en||"待定")+'</span><span class="vs">vs</span><span>'+esc(m.away_zh||m.away_en||"待定")+'</span>';
      if(/待定|TBD/.test(m.home_zh||"")||/待定|TBD/.test(m.away_zh||""))teams='<span class="tbd">'+esc(m.home_zh||"待定")+'</span><span class="vs">vs</span><span class="tbd">'+esc(m.away_zh||"待定")+'</span>';
      var score;
      if((m.status==="played"||m.home_score!=null)&&m.home_score!=null)score='<div class="sch-score">'+m.home_score+":"+m.away_score+'</div>';
      else if(live)score='<div class="sch-score" style="color:var(--accent);border-color:var(--accent)">LIVE</div>';
      else score='<div class="sch-score up">未赛</div>';
      var chip=m.stage==="group"?'<span class="grp">第'+(m.round||"")+'轮</span>':"";
      var local=m.time_local?'<span class="sch-bj">当地 '+esc(m.time_local)+'</span>':"";
      return '<div class="sch-match'+(today?" today":"")+'">'+
        '<div class="sch-when"><div class="wd">'+wd+'</div><div class="wt'+(live?" live":"")+'">'+wt+'</div></div>'+
        '<div class="sch-teams">'+teams+'</div>'+score+
        '<div class="sch-meta">'+chip+'<span class="ven"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.5 7-11a7 7 0 1 0-14 0c0 4.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.6"/></svg>'+esc(venueTxt(m))+'</span>'+local+'</div>'+
      '</div>';
    }
    function sectionsFor(kind){
      var secs=[];
      if(kind!=="ko"){
        GROUPS.forEach(function(g){
          var ms=schedule.filter(function(m){return m.stage==="group"&&m.group===g;}).sort(function(x,y){return bjKey(x)-bjKey(y);});
          if(ms.length)secs.push({label:g+" 组",sub:ms.length+" 场",matches:ms});
        });
      }
      if(kind!=="group"){
        KO.forEach(function(st){
          var ms=schedule.filter(function(m){return m.stage===st;}).sort(function(x,y){return bjKey(x)-bjKey(y);});
          if(ms.length)secs.push({label:STAGE_LABEL[st],sub:ms.length+" 场",matches:ms});
        });
      }
      return secs;
    }
    function renderSch(kind){
      var secs=sectionsFor(kind);
      $("schBody").innerHTML=secs.map(function(s){
        return '<div class="sch-day"><div class="sch-stage-h">'+esc(s.label)+'<span class="cnt">'+esc(s.sub)+'</span></div>'+
          s.matches.map(matchRow).join("")+'</div>';
      }).join("")||'<div class="lg-empty">暂无赛程数据。</div>';
    }
    var played=schedule.filter(function(m){return m.status==="played";}).length;
    $("schSummary").textContent=(TOUR.teams||48)+" 队 · "+(TOUR.matches||schedule.length)+" 场 · "+(TOUR.venues?TOUR.venues.length:16)+" 城办赛 · 已赛 "+played+" 场";
    var tabs=[["全部","all"],["小组赛","group"],["淘汰赛","ko"]];
    $("schTabs").innerHTML=tabs.map(function(t,i){return '<button class="mtab'+(i===0?" on":"")+'" data-k="'+t[1]+'" type="button">'+t[0]+'</button>';}).join("");
    $("schTabs").addEventListener("click",function(e){var b=e.target.closest(".mtab");if(!b)return;Array.prototype.forEach.call($("schTabs").children,function(x){x.classList.remove("on");});b.classList.add("on");renderSch(b.getAttribute("data-k"));$("schBody").scrollTop=0;});
    renderSch("all");
    if(schBtn)schBtn.addEventListener("click",function(){openModal(schModal);
      // 打开后滚到「当日」最近的比赛
      setTimeout(function(){var t=$("schBody").querySelector(".sch-match.today");if(t)t.scrollIntoView({block:"center"});},120);});
  }else if(schBtn){
    // 无赛程数据：标题不可点
    schBtn.style.cursor="default";var cta=schBtn.querySelector(".tourney-cta");if(cta)cta.style.display="none";
  }

  /* ---------- 净盈亏按钮 + 战绩弹窗 ---------- */
  var pnlBtn=$("pnlBtn"), lgModal=$("lgModal");
  if(LED&&LED.days&&LED.days.length){
    var days=LED.days.slice();
    var totalStake=0,totalPayout=0,pendingDays=0,pendingStake=0;
    days.forEach(function(d){totalStake+=(+d.stake||0);if(d.status==="pending"){pendingDays++;pendingStake+=(+d.stake||0);}else{totalPayout+=(+d.payout||0);}});
    var net=totalPayout-totalStake;
    var cur=LED.currency||"¥";

    // 头部按钮
    pnlBtn.style.display="inline-flex";
    pnlBtn.classList.add(net<0?"neg":(net>0?"pos":""));
    $("pnlVal").textContent=fmtSigned(net)+cur;

    // 弹窗统计
    if(LED.days.length){var f=days[0].date.split("-"),l=days[days.length-1].date.split("-");$("lgRange").textContent=f[1]+"."+f[2]+" — "+l[1]+"."+l[2]+" · 共 "+days.length+" 天";}
    $("lgStats").innerHTML=
      '<div class="lg-stat"><span class="k">总投入</span><span class="v">'+fmtAmt(totalStake)+'<small>'+cur+'</small></span><span class="sub">'+days.filter(function(d){return (+d.stake||0)>0;}).length+' 天有投注</span></div>'+
      '<div class="lg-stat"><span class="k">已兑收入</span><span class="v">'+fmtAmt(totalPayout)+'<small>'+cur+'</small></span><span class="sub">'+(pendingDays?(pendingDays+" 天待开奖（按 0 计）"):"全部已结算")+'</span></div>'+
      '<div class="lg-stat big"><span class="k">净盈亏</span><span class="v '+(net<0?"neg":(net>0?"pos":""))+'">'+fmtSigned(net)+'<small>'+cur+'</small></span><span class="sub">已兑收入 − 总投入</span></div>';

    function legRow(l){
      var m='<div class="lm">'+esc(l.home||"")+'<i>vs</i>'+esc(l.away||"")+'</div>';
      if(l.scores&&l.scores.length){
        m+='<div class="lsel">'+l.scores.map(function(s){return '<span class="ls">'+esc(s.s||"")+(s.o!=null?'<b>@'+fmtOdds(s.o)+'</b>':"")+'</span>';}).join("")+'</div>';
      }
      if(l.play)m+='<span class="lplay">'+esc(l.play)+'</span>';
      return '<div class="lg-leg">'+m+'</div>';
    }
    function ticket(t){
      var rec=!!t.rec,self=!!t.self;
      var tag=rec?'<span class="tag">推荐</span>':(self?'<span class="tag self">自购</span>':"");
      var way=(t.way||"")+(t.mult?(" × "+t.mult+"倍"):"")+(t.bets?(" · "+t.bets+"注"):"");
      var foot='<span class="stk">投入 <b>'+(t.stake!=null?fmtAmt(t.stake):"—")+'</b>'+cur+'</span>'+
        (t.max!=null?'<span class="mx">'+fmtAmt(t.max)+cur+'<small>理论最高奖金</small></span>':'');
      return '<div class="lg-ticket'+(rec?" rec":"")+(self?" self":"")+'">'+
        '<div class="lg-tk-h"><span class="nm">'+esc(t.name||"方案")+'</span>'+tag+'<span class="way">'+esc(way)+'</span></div>'+
        '<div class="lg-legs">'+(t.legs||[]).map(legRow).join("")+'</div>'+
        (t.note?'<div class="lg-daynote" style="padding:0">'+esc(t.note)+'</div>':"")+
        '<div class="lg-tk-f">'+foot+'</div></div>';
    }
    function dayCard(d){
      var p=d.date.split("-").map(Number),wd=weekday(p[0],p[1],p[2]);
      var stake=+d.stake||0,payout=d.payout,hasTk=d.tickets&&d.tickets.length;
      var st=d.status, badge, amt;
      if(st==="pending"){badge='<span class="lg-badge pend">待开奖</span>';amt='<span class="lg-amt"><span class="al">投入</span><span class="av out">'+fmtAmt(stake)+'</span></span><span class="lg-amt"><span class="al">收入</span><span class="av in zero">待开奖</span></span>';}
      else if(st==="nobet"||stake===0){badge='<span class="lg-badge rest">未投注</span>';amt='<span class="lg-amt"><span class="al">投入</span><span class="av out">0.00</span></span>';}
      else if((+payout||0)>0){badge='<span class="lg-badge win">中奖 +'+fmtAmt(payout)+'</span>';amt='<span class="lg-amt"><span class="al">投入</span><span class="av out">'+fmtAmt(stake)+'</span></span><span class="lg-amt"><span class="al">收入</span><span class="av in">'+fmtAmt(payout)+'</span></span>';}
      else{badge='<span class="lg-badge lose">未中</span>';amt='<span class="lg-amt"><span class="al">投入</span><span class="av out">'+fmtAmt(stake)+'</span></span><span class="lg-amt"><span class="al">收入</span><span class="av in zero">0.00</span></span>';}
      var expandable=hasTk;
      var cls="lg-day"+(expandable?"":(st==="nobet"||stake===0?" nobet":" noinfo"));
      var inner;
      if(hasTk){inner=(d.note?'<div class="lg-daynote">'+esc(d.note)+'</div>':"")+'<div class="lg-tickets">'+d.tickets.map(ticket).join("")+'</div>';}
      else{inner='<div class="lg-empty">'+(d.note?esc(d.note):(stake>0?"该日仅记录金额，未留存具体票面明细。":"当日未参与投注。"))+'</div>';}
      return '<div class="'+cls+'">'+
        '<div class="lg-day-head">'+
          '<div class="lg-dline"><span class="lg-date">'+pad(p[1])+'-'+pad(p[2])+' <span class="wk">'+wd+'</span></span>'+badge+'</div>'+
          '<div class="lg-amts">'+amt+'</div>'+
          '<span class="lg-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>'+
        '</div>'+
        '<div class="lg-day-body"><div class="lg-day-body-in">'+inner+'</div></div>'+
      '</div>';
    }
    // 倒序：最新在上
    var ordered=days.slice().sort(function(a,b){return a.date<b.date?1:-1;});
    $("lgBody").innerHTML=ordered.map(dayCard).join("");
    $("lgFoot").innerHTML=(LED.note?esc(LED.note)+"　":"")+"数据更新于 "+esc(LED.updated||"")+"。仅为个人投注记录，不构成任何投注建议；博彩有风险，参与需理性。";
    $("lgBody").addEventListener("click",function(e){var h=e.target.closest(".lg-day-head");if(!h)return;var card=h.closest(".lg-day");if(card.classList.contains("nobet")||card.classList.contains("noinfo"))return;card.classList.toggle("open");});
    if(pnlBtn)pnlBtn.addEventListener("click",function(){openModal(lgModal);});
  }

})();
</script>
</body>
</html>
