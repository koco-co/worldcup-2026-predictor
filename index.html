            var aw = wdlOf(x.m.home_score, x.m.away_score), act = x.m.home_score+':'+x.m.away_score;
            c.wdlHit = pk.wdl===aw; if(c.wdlHit) wHit++;
            c.scoreHit = pk.score===act; if(c.scoreHit) sHit++;
            c.predTag = c.scoreHit?'比分命中':(c.wdlHit?'胜负命中':'未中');
            c.predTagBg = c.scoreHit?C.greenSoft:(c.wdlHit?C.goldSoft:'#F0E2E0');
            c.predTagColor = c.scoreHit?C.green:(c.wdlHit?'#5a4400':C.red);
          } else {
            c.predTag='已预测'; c.predTagBg=C.claySoft; c.predTagColor=C.clay;
          }
        }
        return c;
      });
      // 押注票面：真源 betting-ledger.json（按北京日期对齐）
      var ld = LBYDATE[p.date];
      var tickets = (ld && ld.tickets) ? ld.tickets.map(function(t){ return settleTicket(t, ld.status); }) : [];
      var dayStake = ld ? (ld.stake||0) : 0;
      var daySettled = !!(ld && ld.status==='settled');
      var dayPending = !!(ld && ld.status==='pending');
      var dayNet = daySettled ? Math.round(((ld.payout||0)-dayStake)*100)/100 : null;
      var grps = Array.from(new Set(dayMs.filter(function(m){ return m.group; }).map(function(m){ return m.group; })));
      var rounds = Array.from(new Set(dayMs.filter(function(m){ return m.round; }).map(function(m){ return m.round; })));
      var hasUnplayedMatches = dayMs.some(function(m){ return m.home_score == null || m.away_score == null; });
      var dt = p.date.split('-').map(Number);
      var wd = ['周日','周一','周二','周三','周四','周五','周六'][new Date(Date.UTC(dt[0],dt[1]-1,dt[2])).getUTCDay()];
      return { date:p.date, dateShort:dt[1]+'月'+dt[2]+'日', wd:wd, url:p.url, reviewUrl:p.reviewUrl||'#',
        hasReview: !!p.reviewUrl,
        groupsLabel: grps.length ? (grps.join(' / ')+' 组'+(rounds.length?(' · 第 '+rounds[0]+' 轮'):'')) : '淘汰赛',
        count: matches.length+' 场', matches:matches, isToday: p.date===today, hasUnplayedMatches: hasUnplayedMatches,
        tickets:tickets, hasTickets: tickets.length>0,
        comboHeadLabel: tickets.length ? ('比分金字塔 · '+tickets.length+' 张 · 投 '+dayStake+'¥'+(dayPending?' · 待开奖':(daySettled?' · 已结算':''))) : '',
        hasStats: settled>0,
        statLabel: settled>0 ? ('胜负 '+wHit+'/'+settled+' · 比分 '+sHit+'/'+settled) : '',
        statColor: settled>0 && wHit===settled ? C.green : (settled>0 ? '#5a4400' : C.mut),
        hasProfit: dayNet!=null,
        profitLabel: dayNet!=null ? ((dayNet>=0?'+':'')+dayNet.toFixed(2)+'¥') : '',
        profitColor: (dayNet||0)>=0 ? C.green : C.red,
        hasPending: dayPending, pendingLabel: dayPending ? ('待开奖 · 投 '+dayStake+'¥') : '',
        _settled:settled, _wHit:wHit, _sHit:sHit };
    });
  }

  // ===== build the full view-model (ported from renderVals) =====
  function buildVM(){
    var st = state;
    var base = {
      ready:false, loading:true, tab:st.tab,
      isBracket:false, isStandings:false, isData:false, isPredict:false,
      hasBanner:false, banner:[], groups:[], bracket:[], overall:[], stats:[], firepower:[], dailyPL:[],
      predictions:[], todayPred:null, hasTodayPred:false, record:null, hasRecord:false,
      clockStr:'—', lastSyncStr:'—', syncText:'连接中…', syncDot:C.gold, syncTitle:'当前使用页面内联数据',
      spinStyle:'display:inline-block;', xhsUrl:XHS,
      tabs:[
        { key:'bracket', label:'对阵全景', icon:'◳', bg: st.tab==='bracket'? C.ink:'#FBFAF5', color: st.tab==='bracket'? C.paper:C.ink, border: st.tab==='bracket'? C.ink:'#E4DECF' },
        { key:'predict', label:'每日预测', icon:'✎', bg: st.tab==='predict'? C.ink:'#FBFAF5', color: st.tab==='predict'? C.paper:C.ink, border: st.tab==='predict'? C.ink:'#E4DECF' },
        { key:'standings', label:'积分榜', icon:'▦', bg: st.tab==='standings'? C.ink:'#FBFAF5', color: st.tab==='standings'? C.paper:C.ink, border: st.tab==='standings'? C.ink:'#E4DECF' },
        { key:'data', label:'数据中心', icon:'◇', bg: st.tab==='data'? C.ink:'#FBFAF5', color: st.tab==='data'? C.paper:C.ink, border: st.tab==='data'? C.ink:'#E4DECF' }
      ]
    };
    if(!st.ready) return base;

    // prediction report links by Beijing date
    var predByDate = {}; (PRED||[]).forEach(function(p){ predByDate[p.date] = p.url; });
    var linkFor = function(c){ var u = predByDate[c.ymd]; if(u){ c.url=u; c.linkTag='✎ 预测'; c.linkColor=C.clay; } else { c.linkTag='▶ 直播'; c.linkColor='#a89f90'; } return c; };
    var tomorrowY = bjTomorrow();

    // groups + standings
    var groups = GROUPS.map(function(letter){
      var rows0 = standings(letter);
      var played = DATA.schedule.filter(function(m){ return m.stage==='group'&&m.group===letter&&m.home_score!=null; }).length;
      var tomorrowMatches = DATA.schedule.filter(function(m){ return m.stage==='group'&&m.group===letter&&bj(m).ymd===tomorrowY; })
        .map(function(m){ return { m:m, k:bj(m).ms }; }).sort(function(a,b){ return b.k-a.k; }).map(function(x){ return x.m; });
      var tomorrowByTeam = {};
      tomorrowMatches.forEach(function(m){
        var b = bj(m);
        tomorrowByTeam[m.home_zh] = { time:b.hm, opponent:m.away_zh };
        tomorrowByTeam[m.away_zh] = { time:b.hm, opponent:m.home_zh };
      });
      var rows = rows0.map(function(r,i){
        var rs = rowStyle(i), tm = tomorrowByTeam[r.t] || null;
        return { rank:i+1, flag:flag(r.t), name:r.t, P:r.P, W:r.W, D:r.D, L:r.L,
          GD:gd(r.GD), gdColor:gdColor(r.GD), Pts:r.Pts, bar:rs.bar, rowBg:rs.rowBg,
          hasTomorrow: !!tm, tomorrowLabel: tm ? ('明日 '+tm.time) : '', tomorrowTitle: tm ? ('明天 '+tm.time+' 对 '+tm.opponent) : '' };
      });
      var fixtures = DATA.schedule.filter(function(m){ return m.stage==='group'&&m.group===letter; })
        .map(function(m){ return { m:m, k:bj(m).ms }; }).sort(function(a,b){ return b.k-a.k; }).map(function(x){ return linkFor(card(x.m)); });
      return { letter:letter, label:letter+' 组', progress: played+'/6', rows:rows, fixtures:fixtures,
        hasTomorrow: tomorrowMatches.length>0, tomorrowCount: tomorrowMatches.length, tomorrowLabel: tomorrowMatches.length ? ('明日 '+tomorrowMatches.length+'场') : '' };
    });

    // overall
    var all = [];
    GROUPS.forEach(function(letter){
      standings(letter).forEach(function(r,i){ all.push(Object.assign({}, r, { group:letter, gpos:i })); });
    });
    all.sort(function(p,q){ return q.Pts-p.Pts || q.GD-p.GD || q.GF-p.GF || p.t.localeCompare(q.t,'zh'); });
    var overall = all.map(function(r,i){ return {
      rank:i+1, flag:flag(r.t), name:r.t, group:r.group, P:r.P, W:r.W, D:r.D, L:r.L,
      GD:gd(r.GD), gdColor:gdColor(r.GD), Pts:r.Pts,
      dot: r.gpos<2 ? C.green : (r.gpos===2 ? C.gold : '#D8D2C5'),
      qual: r.gpos<2 ? 'q' : (r.gpos===2 ? 'p' : 'o'),
      rowBg: i%2 ? 'rgba(244,241,234,.5)' : 'transparent'
    }; });
    // 本届积分排名映射（球队中文名 → 总积分榜名次），供卡片「本届 N」徽章使用
    TRANK = {}; overall.forEach(function(o){ TRANK[o.name] = o.rank; });

    // bracket
    var byStage = function(s){ return DATA.schedule.filter(function(m){ return m.stage===s; })
      .map(function(m){ return { m:m, k:bj(m).ms }; }).sort(function(a,b){ return b.k-a.k; }).map(function(x){ return card(x.m); }); };
    var r32=byStage('r32'), r16=byStage('r16'), qf=byStage('qf'), sf=byStage('sf'), fin=byStage('final'), third=byStage('third');
    var bracket = [
      { label:'32 强', count:r32.length+' 场', cells:r32 },
      { label:'16 强', count:r16.length+' 场', cells:r16 },
      { label:'8 强',  count:qf.length+' 场',  cells:qf },
      { label:'4 强',  count:sf.length+' 场',  cells:sf },
      { label:'决赛',  count:'冠军 · 季军', cells:fin.concat(third) }
    ];

    // schedule（日期优先视图：按北京日期分组）
    var dayMap = {}, dayOrder = [];
    DATA.schedule.forEach(function(m){
      var b = bj(m), y = b.ymd;
      if(!dayMap[y]){ dayMap[y] = { ymd:y, md:b.md, wd:b.wd, items:[] }; dayOrder.push(y); }
      dayMap[y].items.push({ m:m, k:b.ms });
    });
    dayOrder.sort(function(a,b){ return b.localeCompare(a); });
    var todayY = bjToday();
    var schDay = st.schDay;
    if(!schDay || dayOrder.indexOf(schDay) < 0){
      schDay = dayOrder.indexOf(todayY) >= 0 ? todayY
        : (dayOrder.filter(function(y){ return y >= todayY; }).sort()[0] || dayOrder[0] || '');
    }
    var schDays = dayOrder.map(function(y){
      var d = dayMap[y], played = d.items.filter(function(it){ return it.m.home_score != null; }).length;
      return { ymd:y, md:d.md, wd:d.wd, n:d.items.length, count:d.items.length+' 场',
        active: y===schDay, isToday: y===todayY, isPast: (y < todayY && played === d.items.length) };
    });
    var schMatches = (dayMap[schDay] ? dayMap[schDay].items.slice().sort(function(a,b){ return b.k-a.k; }) : [])
      .map(function(it){ var c = linkFor(card(it.m)); c.stage = stageLabel(it.m); return c; });
    var schedule = { days: schDays, matches: schMatches, hasDays: schDays.length>0,
      sel: (dayMap[schDay] ? { ymd:schDay, md:dayMap[schDay].md, wd:dayMap[schDay].wd, count:dayMap[schDay].items.length } : null) };

    // banner
    var sched = DATA.schedule.map(function(m,i){ return { m:m, i:i, ph:phase(m), k:bj(m).ms }; });
    var bannerMatches = sched.filter(function(x){ return bj(x.m).ymd===tomorrowY; }).sort(function(a,b){ return b.k-a.k; });
    var pick = bannerMatches;
    var banner = pick.map(function(x){
      var b=bj(x.m), isLive=x.ph==='live', isSoon=x.ph==='soon';
      return { key:'b'+x.i, fh:flag(x.m.home_zh), hn:x.m.home_zh, fa:flag(x.m.away_zh), an:x.m.away_zh,
        timeStr:b.md+' '+b.wd+' '+b.hm,
        tag: isLive?'直播中':(isSoon?'即将开赛':'未开赛'),
        tagBg: isLive?C.red:(isSoon?C.gold:'#6b6358'),
        cd: isLive?'正在直播':fmtMs(x.k - now),
        cdColor: isLive?'#FF6b7f':(isSoon?'#E8B84B':'#b8b0a2'),
        url:XHS, _k:x.k, _live:isLive };
    });

    // data center
    var gPlayed = DATA.schedule.filter(function(m){ return m.stage==='group'&&m.home_score!=null; });
    var goals = gPlayed.reduce(function(s,m){ return s+m.home_score+m.away_score; },0);
    var upcomingN = DATA.schedule.filter(function(m){ return m.home_score==null; }).length;
    var big=null, bigM=0;
    gPlayed.forEach(function(m){ var d=Math.abs(m.home_score-m.away_score); if(d>bigM){ bigM=d; big=m; } });
    var bigLabel = big ? flag(big.home_zh)+big.home_zh+' '+big.home_score+'-'+big.away_score+' '+big.away_zh+flag(big.away_zh) : '—';
    var stats = [
      { label:'已赛 / 总场次', value: gPlayed.length+'/104', sub:'小组赛进行中' },
      { label:'总进球', value: String(goals), sub:'场均 '+(gPlayed.length?(goals/gPlayed.length).toFixed(2):'0')+' 球' },
      { label:'待赛场次', value: String(upcomingN), sub:'含淘汰赛' },
      { label:'最大分差', value: bigM+' 球', sub: bigLabel }
    ];
    var fp0 = all.slice().sort(function(p,q){ return q.GF-p.GF || q.GD-p.GD; }).slice(0,10);
    var maxGF = fp0.length ? fp0[0].GF : 1;
    var firepower = fp0.map(function(r,i){ return { rank:i+1, flag:flag(r.t), name:r.t, group:r.group, gf:r.GF,
      barW: Math.round((r.GF/(maxGF||1))*100)+'%' }; });

    // 每日盈亏走势（真源台账，替代示例赔率）
    var ledgerDays = ledgerDayList();
    var plDays = ledgerDays.slice().sort(function(a,b){ return b.date.localeCompare(a.date); }); // 降序：最近日期在上
    var maxAbs = 1;
    plDays.forEach(function(d){ if(d.status==='settled'||d.status==='pending'){ var n=Math.abs((d.payout||0)-(d.stake||0)); if(n>maxAbs) maxAbs=n; } });
    var dailyPL = plDays.map(function(d){
      var dt=d.date.split('-').map(Number);
      var settled = d.status==='settled';
      var pending = d.status==='pending';
      // 待开奖日按口径「收入暂记 0」算出暂记净额(开奖后回填),让列表逐日加总 = 头部净盈亏
      var net = (settled||pending) ? Math.round(((d.payout||0)-(d.stake||0))*100)/100 : null;
      return {
        date: dt[1]+'/'+dt[2], stakeLabel: '投 '+(d.stake||0)+(d.payout!=null?(' · 收 '+fmtMoney(d.payout)):''),
        nobet: d.status==='nobet', pending: pending, settled: settled,
        netLabel: settled ? ((net>=0?'+':'')+net.toFixed(0)+'¥')
                : pending ? (net.toFixed(0)+'¥ 暂记')
                : (d.status==='nobet'?'未下注':'—'),
        netColor: settled ? (net>=0?C.green:C.clay) : C.mut,
        barW: (net!=null) ? (Math.round(Math.abs(net)/maxAbs*100)+'%') : '0%',
        barColor: settled ? (net>=0?C.green:C.clay) : pending ? '#C9C1B2' : '#D8D2C5'
      };
    });

    // predictions
    var preds = predictions().sort(function(a,b){ return b.date.localeCompare(a.date); });
    var todayBJ = bjToday();
    var upcomingPreds = preds.filter(function(p){ return p.date>=todayBJ && p.hasUnplayedMatches; })
      .sort(function(a,b){ return a.date.localeCompare(b.date); });
    var todayPred = upcomingPreds[0] || preds.find(function(p){ return p.isToday; }) || null;
    // 本届战绩 · 真源台账（口径同复盘报告：净盈亏 = 已兑奖 − 总投入；待开奖日收入按 0 计入，开奖后回填）
    var rSettledDays=0, rStake=0, rPayout=0, pendDays=[], pendStake=0;
    ledgerDays.forEach(function(d){
      if(d.status==='nobet') return;
      rStake += d.stake||0;
      rPayout += (d.payout!=null ? d.payout : 0);
      if(d.status==='settled') rSettledDays++;
      if(d.status==='pending'){ pendDays.push(d); pendStake += d.stake||0; }
    });
    var rNet = Math.round((rPayout-rStake)*100)/100;
    // 命中率：仅来自有逐场预测明细的日子（picks）
    var oSettled=0, oW=0, oS=0;
    preds.forEach(function(p){ oSettled+=p._settled||0; oW+=p._wHit||0; oS+=p._sHit||0; });
    var record = {
      settledDays: rSettledDays, stakeLabel: rStake+'¥', payoutLabel: fmtMoney(rPayout)+'¥',
      netLabel: (rNet>=0?'+':'')+rNet.toFixed(2)+'¥', netColor: rNet>=0? C.green : C.clay,
      roi: rStake? Math.round(rNet/rStake*100):0,
      hasHits: oSettled>0, wLabel: oW+'/'+oSettled, sLabel: oS+'/'+oSettled,
      wRate: oSettled? Math.round(oW/oSettled*100):0, sRate: oSettled? Math.round(oS/oSettled*100):0,
      hasPending: pendDays.length>0, pendLabel: pendDays.length? (pendDays.length+' 天待开奖 · 投 '+pendStake+'¥') : ''
    };

    var liveSources = (LIVE_STATUS || []).map(function(s){
      var status = s.status || 'unknown';
      return {
        name: s.name || 'unknown',
        status: status,
        detail: s.detail || '',
        rows: s.rows,
        updated: s.updated || '',
        color: status === 'ok' ? C.green : (status === 'fallback' ? C.gold : C.clay),
        bg: status === 'ok' ? '#EAF2E8' : (status === 'fallback' ? '#F5E7C5' : '#F1E2D8'),
        label: status === 'ok' ? '已更新' : (status === 'fallback' ? '已降级' : '失败')
      };
    });

    return Object.assign({}, base, {
      ready:true, loading:false,
      isBracket: st.tab==='bracket', isStandings: st.tab==='standings', isData: st.tab==='data', isPredict: st.tab==='predict',
      brView: st.brView, stView: st.stView, schedule: schedule,
      predictions: preds, todayPred:todayPred, hasTodayPred: !!todayPred,
      record:record, hasRecord: record.settledDays>0,
      hasBanner: banner.length>0, banner:banner, bannerExpanded: !!(st.exp && st.exp.banner), groups:groups, bracket:bracket, overall:overall, stats:stats, firepower:firepower, dailyPL:dailyPL,
      liveSources: liveSources, hasLiveSources: liveSources.length>0, oddsCount: ODDS && ODDS.raw ? 1 : 0,
      clockStr: fmtClock(now),
      lastSyncStr: st.lastSync? fmtClock(st.lastSync) : '—',
      syncText: syncLabel(),
      syncDot: syncDot(),
      syncTitle: syncTitle(),
      spinStyle: st.syncing? 'display:inline-block;animation:wcspin .8s linear infinite;' : 'display:inline-block;'
    });
  }

  // ===== full render =====
  function render(){
    var vm = buildVM();
    var html = vHeader(vm);
    if(vm.hasBanner) html += vBanner(vm);
    html += vTabs(vm);
    if(vm.loading) html += vLoading();
    if(vm.isBracket) html += vBracket(vm);
    if(vm.isStandings) html += vStandings(vm);
    if(vm.isData) html += vData(vm);
    if(vm.isPredict) html += vPredict(vm);
    html += vFooter();
    app.innerHTML = html;
    attachHover();
    // 赛程日期条：把选中日横向居中（只动日期条自身 scrollLeft，不影响页面滚动）
    var strip = document.getElementById('wc-daystrip');
    if(strip){ var act = strip.querySelector('[data-schactive="1"]'); if(act){ strip.scrollLeft = act.offsetLeft - strip.clientWidth/2 + act.offsetWidth/2; } }
    lastSig = phaseSig();
  }

  function attachHover(){
    var els = app.querySelectorAll('[data-hover]');
    els.forEach(function(el){
      var on = function(){
        if(el.__base == null) el.__base = el.getAttribute('style') || '';
        el.setAttribute('style', el.__base + ';' + el.getAttribute('data-hover'));
      };
      var off = function(){ el.setAttribute('style', el.__base || ''); };
      // 鼠标 + 键盘(focus/blur)+ 触屏(touch),让反馈在三种输入下都生效
      el.addEventListener('mouseenter', on);
      el.addEventListener('mouseleave', off);
      el.addEventListener('focus', on);
      el.addEventListener('blur', off);
      el.addEventListener('touchstart', on, { passive:true });
      el.addEventListener('touchend', off);
      el.addEventListener('touchcancel', off);
    });
  }

  // ===== per-second tick: phase transitions -> full render; else patch clock + countdowns =====
  function phaseSig(){
    if(!state.ready || !DATA) return 'boot';
    var s = '';
    for(var i=0;i<DATA.schedule.length;i++){ s += phase(DATA.schedule[i]).charAt(0); }
    // 含北京日期：跨 0 点时「今日赛前预测」高亮 / isToday 才能在 1 秒内随之切换（对齐原稿每秒重算 bjToday）
    return state.tab + '|' + bjToday() + '|' + s;
  }
  function tick(){
    now = Date.now();
    if(state.ready && phaseSig() !== lastSig){ render(); return; }
    var ck = document.getElementById('wc-clock');
    if(ck) ck.textContent = fmtClock(now);
    var cds = app.querySelectorAll('.wc-cd');
    cds.forEach(function(el){
      if(el.getAttribute('data-live') === '1'){ el.textContent = '正在直播'; return; }
      el.textContent = fmtMs(Number(el.getAttribute('data-k')) - now);
    });
  }

  // ===== sync (local live snapshot service with embedded-data fallback) =====
  function sync(force){
    if(state.syncing) return;
    state.syncing = true;
    state.syncError = '';
    render();
    var done = function(ok){
      state.syncing = false;
      state.lastSync = Date.now();
      if(ok === false && !LIVE_STATUS.length){
        LIVE_STATUS = [{ name:'local-data', status:'fallback', detail:'using embedded local data' }];
      }
      render();
    };
    var ep = liveEndpoint(!!force);
    if(!ep){
      LIVE_STATUS = [{ name:'local-data', status:'fallback', detail:'no live sync server' }];
      setTimeout(function(){ done(true); }, 150);
      return;
    }
    fetch(ep, { cache:'no-store' })
      .then(function(r){
        if(!r.ok) throw new Error('HTTP '+r.status);
        return r.json();
      })
      .then(function(snap){
        if(!applyLiveSnapshot(snap)) throw new Error('invalid live snapshot');
        state.syncError = '';
        done(true);
      })
      .catch(function(err){
        state.syncError = err && err.message ? err.message : 'live sync failed';
        LIVE_STATUS = [{ name:'live-sync', status:'error', detail:state.syncError }];
        done(false);
      });
  }

        '</div>'+
        '<div style="min-width:0;">'+
          '<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:11px;color:#8C8478;">'+
            '<span style="font-weight:700;color:#C0613B;">'+esc(stageLabel(m))+'</span>'+
            '<span>对手 '+esc(opponent)+'</span>'+
            '<span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(c.venue)+'</span>'+
          '</div>'+
          '<div style="display:flex;flex-direction:column;gap:3px;">'+teamLine(c,'16px','13.5px','13.5px')+'</div>'+
        '</div>'+
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;text-align:right;">'+
          '<span style="font-size:9.5px;font-weight:700;padding:3px 7px;border-radius:5px;background:'+c.phaseBg+';color:'+c.phaseColor+';'+c.ring+'">'+esc(c.phaseLabel)+'</span>'+
          '<span style="font-size:10.5px;color:#C0613B;font-weight:700;">'+linkTag+' →</span>'+
        '</div>'+
      '</a>';
    });
    var backBtn = teamModalStack.length ? '<button data-team-back title="返回上一支队伍" style="flex:none;display:inline-flex;align-items:center;gap:5px;height:32px;padding:0 10px;border-radius:9px;border:1px solid #E4DECF;background:#FBFAF5;color:#2A2622;cursor:pointer;font-size:12px;font-weight:700;">← 返回</button>' : '';
    teamModalBox.innerHTML =
      '<div data-team-backdrop style="position:fixed;inset:0;z-index:160;background:rgba(42,38,34,.38);display:flex;align-items:center;justify-content:center;padding:28px;">'+
        '<section role="dialog" aria-modal="true" aria-label="'+esc(team)+' 本届世界杯比赛" style="width:min(880px,calc(100vw - 40px));max-height:calc(100vh - 56px);display:flex;flex-direction:column;background:#FBFAF5;border:1px solid #E4DECF;border-radius:16px;box-shadow:0 22px 70px rgba(42,38,34,.28);overflow:hidden;">'+
          '<div style="display:flex;align-items:flex-start;gap:14px;padding:18px 20px 15px;border-bottom:1px solid #EFEADD;background:#F4F1EA;">'+
            backBtn+
            '<span style="font-size:30px;line-height:1;flex:none;">'+flag(team)+'</span>'+
            '<div style="min-width:0;flex:1;">'+
              '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'+
                '<h2 style="margin:0;font-family:\'Source Serif 4\',serif;font-size:24px;line-height:1.1;font-weight:700;">'+esc(team)+'</h2>'+rankBadge(team)+trankBadge(team)+
              '</div>'+
              '<div style="margin-top:6px;font-size:12.5px;color:#8C8478;">'+esc(record)+' · 本届全部 '+matches.length+' 场</div>'+
            '</div>'+
            '<button data-team-close title="关闭" aria-label="关闭弹窗" style="flex:none;width:34px;height:34px;border-radius:9px;border:1px solid #E4DECF;background:#FBFAF5;color:#8C8478;cursor:pointer;font-size:20px;line-height:1;">×</button>'+
          '</div>'+
          '<div style="overflow:auto;padding:0 0 6px;background:#FBFAF5;">'+(rows || '<div style="padding:24px;color:#8C8478;font-size:13px;">暂无比赛。</div>')+'</div>'+
        '</section>'+
      '</div>';
    teamModalBox.setAttribute('data-current-team', team);
    document.body.style.overflow = 'hidden';
    if(!opts.skipUrl) syncUrlState(!opts.replaceUrl, { team:team });
  }
  function goTeamModalBack(){
    var prev = teamModalStack.pop();
    if(prev) openTeamModal(prev, { pushHistory:false, replaceUrl:true });
  }
  function closeTeamModal(){
    var opts = arguments[0] || {};
    teamModalStack = [];
    teamModalBox.removeAttribute('data-current-team');
    teamModalBox.innerHTML = '';
    document.body.style.overflow = '';
    if(!opts.skipUrl) syncUrlState(false, { team:'' });
  }
  function openReport(url){
    if(!isReportUrl(url)) { window.open(url, '_blank', 'noopener'); return; }
    reportBox.innerHTML =
      '<div style="position:fixed;inset:0;z-index:200;background:#F4F1EA;display:flex;flex-direction:column;">'+
        '<div style="flex:none;display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid #E4DECF;background:rgba(244,241,234,.96);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);">'+
          '<button data-report-back style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid #E4DECF;background:#FBFAF5;color:#2A2622;border-radius:9px;font-weight:600;font-size:13px;cursor:pointer;">← 返回</button>'+
          '<span style="font-size:12.5px;color:#8C8478;font-family:\'Spline Sans Mono\',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;">'+esc(decodeURIComponent(url))+'</span>'+
          '<a href="'+safeUrl(url)+'" target="_blank" rel="noopener" style="flex:none;font-size:12px;color:#C0613B;text-decoration:none;font-weight:600;">↗ 新标签打开</a>'+
        '</div>'+
        '<iframe src="'+esc(url)+'" style="flex:1;width:100%;border:0;background:#fff;"></iframe>'+
      '</div>';
    document.body.style.overflow = 'hidden';
  }
  function closeReport(){ reportBox.innerHTML = ''; document.body.style.overflow = ''; }
  reportBox.addEventListener('click', function(e){ if(e.target.closest('[data-report-back]')) history.back(); });
  teamModalBox.addEventListener('click', function(e){
    if(e.target.closest('[data-team-back]')){ e.preventDefault(); e.stopPropagation(); goTeamModalBack(); return; }
    var team = e.target.closest('[data-team]');
    if(team){ e.preventDefault(); e.stopPropagation(); openTeamModal(team.getAttribute('data-team'), { pushHistory:true }); return; }
    var report = e.target.closest('[data-report]');
    if(report){ e.preventDefault(); closeTeamModal(); var u = report.getAttribute('data-report'); history.pushState({ wcReport:u }, ''); openReport(u); return; }
    if(e.target.closest('[data-team-close]') || e.target.hasAttribute('data-team-backdrop')) closeTeamModal();
  });
  teamModalBox.addEventListener('keydown', function(e){
    var team = e.target.closest('[data-team]');
    if(team && (e.key==='Enter' || e.key===' ')){ e.preventDefault(); openTeamModal(team.getAttribute('data-team'), { pushHistory:true }); }
  });
  window.addEventListener('popstate', restoreUrlState);
  window.addEventListener('keydown', function(e){ if(e.key==='Escape' && teamModalBox.innerHTML) closeTeamModal(); });

  // ===== events (delegated, attached once) =====
  app.addEventListener('click', function(e){
    var team = e.target.closest('[data-team]');
    if(team){ e.preventDefault(); e.stopPropagation(); openTeamModal(team.getAttribute('data-team')); return; }
    var report = e.target.closest('[data-report]');
    if(report){ e.preventDefault(); var u = report.getAttribute('data-report'); history.pushState({ wcReport:u }, ''); openReport(u); return; }
    var tabBtn = e.target.closest('[data-tab]');
    if(tabBtn){ setAppState({ tab:tabBtn.getAttribute('data-tab') }); return; }
    var brBtn = e.target.closest('[data-brview]');
    if(brBtn){ setAppState({ brView:brBtn.getAttribute('data-brview') }); return; }
    var stBtn = e.target.closest('[data-stview]');
    if(stBtn){ setAppState({ stView:stBtn.getAttribute('data-stview') }); return; }
    var schBtn = e.target.closest('[data-schday]');
    if(schBtn){ setAppState({ schDay:schBtn.getAttribute('data-schday'), brView:'schedule' }); return; }
    var refresh = e.target.closest('[data-action="refresh"]');
    if(refresh){ sync(true); return; }
    var toggle = e.target.closest('[data-toggle]');
    if(toggle){ toggleExp(toggle.getAttribute('data-toggle')); return; }
  });
  app.addEventListener('keydown', function(e){
    if(e.key!=='Enter' && e.key!==' ') return;
    var team = e.target.closest('[data-team]');
    if(team){ e.preventDefault(); openTeamModal(team.getAttribute('data-team')); return; }
    // 展开行是裸 div(role=button),原生 <button> 由浏览器处理回车,这里只接管非 button
    var toggle = e.target.closest('[data-toggle]');
    if(toggle && toggle.tagName!=='BUTTON'){ e.preventDefault(); toggleExp(toggle.getAttribute('data-toggle')); return; }
  });

  // ===== boot =====
  function boot(){
    DATA = window.WORLDCUP_DATA; FLAGS = window.WORLDCUP_FLAGS || {}; OFF = window.WORLDCUP_VENUE_OFFSET || {}; PRED = window.WORLDCUP_PREDICTIONS || []; LEDGER = window.WORLDCUP_LEDGER || { days: [] }; RANK = window.WORLDCUP_FIFA_RANK || {}; ODDS = window.WORLDCUP_LIVE_ODDS || {};
    var initialTeam = applyUrlState();
    state.ready = true;
    sync(false);
    var n = new Date();
    var ms = (60 - n.getMinutes())*60000 - n.getSeconds()*1000 - n.getMilliseconds();
    setTimeout(function(){ sync(true); setInterval(function(){ sync(true); }, 3600000); }, ms);
    setInterval(tick, 1000);
    render();
    if(initialTeam) openTeamModal(initialTeam, { resetHistory:true, skipUrl:true });
  }

  render(); // initial loading view
  if(window.WORLDCUP_DATA){ boot(); }
  else { var poll = setInterval(function(){ if(window.WORLDCUP_DATA){ clearInterval(poll); boot(); } }, 40); }

  // 兜底诊断：万一数据没就位（如某些预览/浏览器缓存了旧版本，或内联脚本被环境拦截），别无限转圈，直接说明原因
  setTimeout(function(){
    if(state.ready) return;
    var diag = '内联数据脚本(#wc-data)：' + (document.getElementById('wc-data') ? '存在' : '缺失')
      + ' · typeof window.WORLDCUP_DATA = ' + (typeof window.WORLDCUP_DATA);
    app.innerHTML = vHeader(buildVM())
      + '<div style="max-width:1340px;margin:40px auto;padding:0 24px;">'
        + '<div style="background:#FBFAF5;border:1px solid #E8E2D4;border-radius:15px;padding:22px 24px;box-shadow:0 1px 3px rgba(42,38,34,.04);">'
          + '<div style="font-family:\'Source Serif 4\',serif;font-weight:700;font-size:18px;color:#C0613B;margin-bottom:8px;">数据未能加载</div>'
          + '<div style="font-size:13px;color:#8C8478;line-height:1.7;">页面已内置完整赛程数据，正常无需联网即可显示。看到此提示多半是预览或浏览器缓存了旧版本——请<b>强制刷新</b>（Mac ⌘⇧R · Win Ctrl+F5），或直接用浏览器打开 index.html / 本地静态服务器。</div>'
          + '<div style="font-family:\'Spline Sans Mono\',monospace;font-size:11.5px;color:#a89f90;margin-top:12px;padding-top:12px;border-top:1px solid #EFEADD;">诊断 · ' + diag + '</div>'
        + '</div>'
      + '</div>'
      + vFooter();
  }, 3500);
})();
</script>
</body>
</html>
