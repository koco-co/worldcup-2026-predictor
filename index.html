        o.scoresStr = leg.play ? ('玩法 · '+leg.play) : '';
        o.mark = '·'; o.markColor = C.mut; allHit=false;
      }
      return o;
    });
    var settledAll = !isSelf && !anyUnplayed && (t.legs||[]).length>0;
    var win = settledAll && allHit;
    var payout = (win && t.mult) ? 2*t.mult*prod : 0;
    var profit = settledAll ? Math.round((payout - (t.stake||0))*100)/100 : null;
    var pending = dayStatus==='pending' || !settledAll;
    return {
      name:t.name, hasTag: !!(t.rec||t.self), tag: t.rec?'推荐':(t.self?'自购':''),
      wayLabel: (t.way||'') + (t.mult? (' · '+t.mult+' 倍') : ''),
      betsLabel: (t.bets!=null? t.bets:'—')+' 注', stakeLabel: (t.stake!=null? t.stake:'—')+'¥',
      maxLabel: (t.max!=null? (fmtMoney(t.max)+'¥') : '—'),
      legs:legs, settledAll:settledAll, win:win, isSelf:isSelf,
      statusLabel: pending ? '待结算' : (win?'中奖':'未中'),
      statusBg: pending ? C.claySoft : (win?C.greenSoft:'#F0E2E0'),
      statusColor: pending ? C.clay : (win?C.green:C.red),
      payoutLabel: settledAll ? (win? ('派奖 '+fmtMoney(payout)+'¥') : '派奖 0¥') : '',
      profitLabel: profit!=null ? ((profit>=0?'+':'')+profit.toFixed(2)+'¥') : '',
      profitColor: (profit||0)>=0 ? C.green : C.red
    };
  }

  function predictions(){
    var today = bjToday();
    var LBYDATE = ledgerByDate();
    return (PRED||[]).map(function(p){
      var dayMs = DATA.schedule.filter(function(m){ return bj(m).ymd===p.date; });
      var picks = p.picks || [];
      var findPick = function(m){ return picks.find(function(pk){ return pk.home===m.home_zh && pk.away===m.away_zh; }); };
      var wHit=0, sHit=0, settled=0;
      var matches = dayMs.map(function(m){ return { m:m, k:bj(m).ms }; }).sort(function(a,b){ return a.k-b.k; }).map(function(x){
        var c = card(x.m), pk = findPick(x.m);
        c.hasPick = !!pk;
        c.eid = p.date+'|'+x.m.home_zh+'|'+x.m.away_zh;
        c.ana = analysis(pk); c.hasAnalysis = !!c.ana;
        c.expanded = !!(state.exp && state.exp[c.eid]);
        c.chevStyle = c.expanded ? 'transform:rotate(180deg);transition:transform .2s;' : 'transition:transform .2s;';
        if(pk){
          c.predScore = pk.score; c.predWdl = pk.wdl;
          var played = x.m.home_score!=null && x.m.away_score!=null;
          if(played){
            settled++;
            var aw = wdlOf(x.m.home_score, x.m.away_score), act = x.m.home_score+':'+x.m.away_score;
            c.wdlHit = pk.wdl===aw; if(c.wdlHit) wHit++;
            c.scoreHit = pk.score===act; if(c.scoreHit) sHit++;
            c.predTag = c.scoreHit?'比分命中':(c.wdlHit?'胜负命中':'未中');
            c.predTagBg = c.scoreHit?C.greenSoft:(c.wdlHit?C.goldSoft:'#F0E2E0');
            c.predTagColor = c.scoreHit?C.green:(c.wdlHit?'#5a4400':C.red);
          } else {
            c.predTag='已预测'; c.predTagBg=C.claySoft; c.predTagColor=C.clay;
          }
        }
        return c;
      });
      // 押注票面：真源 betting-ledger.json（按北京日期对齐）
      var ld = LBYDATE[p.date];
      var tickets = (ld && ld.tickets) ? ld.tickets.map(function(t){ return settleTicket(t, ld.status); }) : [];
      var dayStake = ld ? (ld.stake||0) : 0;
      var daySettled = !!(ld && ld.status==='settled');
      var dayPending = !!(ld && ld.status==='pending');
      var dayNet = daySettled ? Math.round(((ld.payout||0)-dayStake)*100)/100 : null;
      var grps = Array.from(new Set(dayMs.filter(function(m){ return m.group; }).map(function(m){ return m.group; })));
      var rounds = Array.from(new Set(dayMs.filter(function(m){ return m.round; }).map(function(m){ return m.round; })));
      var dt = p.date.split('-').map(Number);
      var wd = ['周日','周一','周二','周三','周四','周五','周六'][new Date(Date.UTC(dt[0],dt[1]-1,dt[2])).getUTCDay()];
      return { date:p.date, dateShort:dt[1]+'月'+dt[2]+'日', wd:wd, url:p.url, reviewUrl:p.reviewUrl||'#',
        hasReview: !!p.reviewUrl,
        groupsLabel: grps.length ? (grps.join(' / ')+' 组'+(rounds.length?(' · 第 '+rounds[0]+' 轮'):'')) : '淘汰赛',
        count: matches.length+' 场', matches:matches, isToday: p.date===today,
        tickets:tickets, hasTickets: tickets.length>0,
        comboHeadLabel: tickets.length ? ('比分金字塔 · '+tickets.length+' 张 · 投 '+dayStake+'¥'+(dayPending?' · 待开奖':(daySettled?' · 已结算':''))) : '',
        hasStats: settled>0,
        statLabel: settled>0 ? ('胜负 '+wHit+'/'+settled+' · 比分 '+sHit+'/'+settled) : '',
        statColor: settled>0 && wHit===settled ? C.green : (settled>0 ? '#5a4400' : C.mut),
        hasProfit: dayNet!=null,
        profitLabel: dayNet!=null ? ((dayNet>=0?'+':'')+dayNet.toFixed(2)+'¥') : '',
        profitColor: (dayNet||0)>=0 ? C.green : C.red,
        hasPending: dayPending, pendingLabel: dayPending ? ('待开奖 · 投 '+dayStake+'¥') : '',
        _settled:settled, _wHit:wHit, _sHit:sHit };
    });
  }

  // ===== build the full view-model (ported from renderVals) =====
  function buildVM(){
    var st = state;
    var base = {
      ready:false, loading:true, tab:st.tab,
      isBracket:false, isStandings:false, isData:false, isPredict:false,
      hasBanner:false, banner:[], groups:[], bracket:[], overall:[], stats:[], firepower:[], dailyPL:[],
      predictions:[], todayPred:null, hasTodayPred:false, record:null, hasRecord:false,
      clockStr:'—', lastSyncStr:'—', syncText:'连接中…', syncDot:C.gold,
      spinStyle:'display:inline-block;', xhsUrl:XHS,
      tabs:[
        { key:'bracket', label:'对阵全景', icon:'◳', bg: st.tab==='bracket'? C.ink:'#FBFAF5', color: st.tab==='bracket'? C.paper:C.ink, border: st.tab==='bracket'? C.ink:'#E4DECF' },
        { key:'predict', label:'每日预测', icon:'✎', bg: st.tab==='predict'? C.ink:'#FBFAF5', color: st.tab==='predict'? C.paper:C.ink, border: st.tab==='predict'? C.ink:'#E4DECF' },
        { key:'standings', label:'积分榜', icon:'▦', bg: st.tab==='standings'? C.ink:'#FBFAF5', color: st.tab==='standings'? C.paper:C.ink, border: st.tab==='standings'? C.ink:'#E4DECF' },
        { key:'data', label:'数据中心', icon:'◇', bg: st.tab==='data'? C.ink:'#FBFAF5', color: st.tab==='data'? C.paper:C.ink, border: st.tab==='data'? C.ink:'#E4DECF' }
      ]
    };
    if(!st.ready) return base;

    // prediction report links by Beijing date
    var predByDate = {}; (PRED||[]).forEach(function(p){ predByDate[p.date] = p.url; });
    var linkFor = function(c){ var u = predByDate[c.ymd]; if(u){ c.url=u; c.linkTag='✎ 预测'; c.linkColor=C.clay; } else { c.linkTag='▶ 直播'; c.linkColor='#a89f90'; } return c; };

    // groups + standings
    var groups = GROUPS.map(function(letter){
      var rows0 = standings(letter);
      var played = DATA.schedule.filter(function(m){ return m.stage==='group'&&m.group===letter&&m.home_score!=null; }).length;
      var rows = rows0.map(function(r,i){
        var rs = rowStyle(i);
        return { rank:i+1, flag:flag(r.t), name:r.t, P:r.P, W:r.W, D:r.D, L:r.L,
          GD:gd(r.GD), gdColor:gdColor(r.GD), Pts:r.Pts, bar:rs.bar, rowBg:rs.rowBg };
      });
      var fixtures = DATA.schedule.filter(function(m){ return m.stage==='group'&&m.group===letter; })
        .map(function(m){ return { m:m, k:bj(m).ms }; }).sort(function(a,b){ return a.k-b.k; }).map(function(x){ return linkFor(card(x.m)); });
      return { letter:letter, label:letter+' 组', progress: played+'/6', rows:rows, fixtures:fixtures };
    });

    // overall
    var all = [];
    GROUPS.forEach(function(letter){
      standings(letter).forEach(function(r,i){ all.push(Object.assign({}, r, { group:letter, gpos:i })); });
    });
    all.sort(function(p,q){ return q.Pts-p.Pts || q.GD-p.GD || q.GF-p.GF || p.t.localeCompare(q.t,'zh'); });
    var overall = all.map(function(r,i){ return {
      rank:i+1, flag:flag(r.t), name:r.t, group:r.group, P:r.P, W:r.W, D:r.D, L:r.L,
      GD:gd(r.GD), gdColor:gdColor(r.GD), Pts:r.Pts,
      dot: r.gpos<2 ? C.green : (r.gpos===2 ? C.gold : '#D8D2C5'),
      rowBg: i%2 ? 'rgba(244,241,234,.5)' : 'transparent'
    }; });

    // bracket
    var byStage = function(s){ return DATA.schedule.filter(function(m){ return m.stage===s; })
      .map(function(m){ return { m:m, k:bj(m).ms }; }).sort(function(a,b){ return a.k-b.k; }).map(function(x){ return card(x.m); }); };
    var r32=byStage('r32'), r16=byStage('r16'), qf=byStage('qf'), sf=byStage('sf'), fin=byStage('final'), third=byStage('third');
    var bracket = [
      { label:'32 强', count:r32.length+' 场', cells:r32 },
      { label:'16 强', count:r16.length+' 场', cells:r16 },
      { label:'8 强',  count:qf.length+' 场',  cells:qf },
      { label:'4 强',  count:sf.length+' 场',  cells:sf },
      { label:'决赛',  count:'冠军 · 季军', cells:fin.concat(third) }
    ];

    // banner
    var sched = DATA.schedule.map(function(m,i){ return { m:m, i:i, ph:phase(m), k:bj(m).ms }; });
    var live = sched.filter(function(x){ return x.ph==='live'; });
    var soon = sched.filter(function(x){ return x.ph==='soon'; }).sort(function(a,b){ return a.k-b.k; });
    var up = sched.filter(function(x){ return x.ph==='upcoming'; }).sort(function(a,b){ return a.k-b.k; });
    var pick = live.concat(soon, up).slice(0,10);
    var banner = pick.map(function(x){
      var b=bj(x.m), isLive=x.ph==='live', isSoon=x.ph==='soon';
      return { key:'b'+x.i, fh:flag(x.m.home_zh), hn:x.m.home_zh, fa:flag(x.m.away_zh), an:x.m.away_zh,
        timeStr:b.md+' '+b.wd+' '+b.hm,
        tag: isLive?'直播中':(isSoon?'即将开赛':'未开赛'),
        tagBg: isLive?C.red:(isSoon?C.gold:'#6b6358'),
        cd: isLive?'正在直播':fmtMs(x.k - now),
        cdColor: isLive?'#FF6b7f':(isSoon?'#E8B84B':'#b8b0a2'),
        url:XHS, _k:x.k, _live:isLive };
    });

    // data center
    var gPlayed = DATA.schedule.filter(function(m){ return m.stage==='group'&&m.home_score!=null; });
    var goals = gPlayed.reduce(function(s,m){ return s+m.home_score+m.away_score; },0);
    var upcomingN = DATA.schedule.filter(function(m){ return m.home_score==null; }).length;
    var big=null, bigM=0;
    gPlayed.forEach(function(m){ var d=Math.abs(m.home_score-m.away_score); if(d>bigM){ bigM=d; big=m; } });
    var bigLabel = big ? flag(big.home_zh)+big.home_zh+' '+big.home_score+'-'+big.away_score+' '+big.away_zh+flag(big.away_zh) : '—';
    var stats = [
      { label:'已赛 / 总场次', value: gPlayed.length+'/104', sub:'小组赛进行中' },
      { label:'总进球', value: String(goals), sub:'场均 '+(gPlayed.length?(goals/gPlayed.length).toFixed(2):'0')+' 球' },
      { label:'待赛场次', value: String(upcomingN), sub:'含淘汰赛' },
      { label:'最大分差', value: bigM+' 球', sub: bigLabel }
    ];
    var fp0 = all.slice().sort(function(p,q){ return q.GF-p.GF || q.GD-p.GD; }).slice(0,10);
    var maxGF = fp0.length ? fp0[0].GF : 1;
    var firepower = fp0.map(function(r,i){ return { rank:i+1, flag:flag(r.t), name:r.t, group:r.group, gf:r.GF,
      barW: Math.round((r.GF/(maxGF||1))*100)+'%' }; });

    // 每日盈亏走势（真源台账，替代示例赔率）
    var ledgerDays = ledgerDayList();
    var plDays = ledgerDays.slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
    var maxAbs = 1;
    plDays.forEach(function(d){ if(d.status==='settled'){ var n=Math.abs((d.payout||0)-(d.stake||0)); if(n>maxAbs) maxAbs=n; } });
    var dailyPL = plDays.map(function(d){
      var dt=d.date.split('-').map(Number);
      var settled = d.status==='settled';
      var net = settled ? Math.round(((d.payout||0)-(d.stake||0))*100)/100 : null;
      return {
        date: dt[1]+'/'+dt[2], stakeLabel: '投 '+(d.stake||0)+(d.payout!=null?(' · 收 '+fmtMoney(d.payout)):''),
        nobet: d.status==='nobet', pending: d.status==='pending', settled: settled,
        netLabel: net!=null ? ((net>=0?'+':'')+net.toFixed(0)+'¥') : (d.status==='pending'?'待开奖':(d.status==='nobet'?'未下注':'—')),
        netColor: net!=null ? (net>=0?C.green:C.clay) : C.mut,
        barW: net!=null ? (Math.round(Math.abs(net)/maxAbs*100)+'%') : '0%',
        barColor: net!=null ? (net>=0?C.green:C.clay) : '#D8D2C5'
      };
    });

    // predictions
    var preds = predictions();
    var todayBJ = bjToday();
    var todayPred = preds.find(function(p){ return p.isToday; });
    if(!todayPred){ todayPred = preds.filter(function(p){ return p.date>=todayBJ; }).sort(function(a,b){ return a.date.localeCompare(b.date); })[0] || null; }
    // 本届战绩 · 真源台账（口径同复盘报告：净盈亏 = 已兑奖 − 总投入；待开奖日收入按 0 计入，开奖后回填）
    var rSettledDays=0, rStake=0, rPayout=0, pendDays=[], pendStake=0;
    ledgerDays.forEach(function(d){
      if(d.status==='nobet') return;
      rStake += d.stake||0;
      rPayout += (d.payout!=null ? d.payout : 0);
      if(d.status==='settled') rSettledDays++;
      if(d.status==='pending'){ pendDays.push(d); pendStake += d.stake||0; }
    });
    var rNet = Math.round((rPayout-rStake)*100)/100;
    // 命中率：仅来自有逐场预测明细的日子（picks）
    var oSettled=0, oW=0, oS=0;
    preds.forEach(function(p){ oSettled+=p._settled||0; oW+=p._wHit||0; oS+=p._sHit||0; });
    var record = {
      settledDays: rSettledDays, stakeLabel: rStake+'¥', payoutLabel: fmtMoney(rPayout)+'¥',
      netLabel: (rNet>=0?'+':'')+rNet.toFixed(2)+'¥', netColor: rNet>=0? C.green : C.clay,
      roi: rStake? Math.round(rNet/rStake*100):0,
      hasHits: oSettled>0, wLabel: oW+'/'+oSettled, sLabel: oS+'/'+oSettled,
      wRate: oSettled? Math.round(oW/oSettled*100):0, sRate: oSettled? Math.round(oS/oSettled*100):0,
      hasPending: pendDays.length>0, pendLabel: pendDays.length? (pendDays.length+' 天待开奖 · 投 '+pendStake+'¥') : ''
    };

    return Object.assign({}, base, {
      ready:true, loading:false,
      isBracket: st.tab==='bracket', isStandings: st.tab==='standings', isData: st.tab==='data', isPredict: st.tab==='predict',
      predictions: preds, todayPred:todayPred, hasTodayPred: !!todayPred,
      record:record, hasRecord: record.settledDays>0,
      hasBanner: banner.length>0, banner:banner, groups:groups, bracket:bracket, overall:overall, stats:stats, firepower:firepower, dailyPL:dailyPL,
      clockStr: fmtClock(now),
      lastSyncStr: st.lastSync? fmtClock(st.lastSync) : '—',
      syncText: st.syncing? '正在同步…' : '已同步官方数据',
      syncDot: st.syncing? C.gold : C.green,
      spinStyle: st.syncing? 'display:inline-block;animation:wcspin .8s linear infinite;' : 'display:inline-block;'
    });
  }

  }

  // ===== full render =====
  function render(){
    var vm = buildVM();
    var html = vHeader(vm);
    if(vm.hasBanner) html += vBanner(vm);
    html += vTabs(vm);
    if(vm.loading) html += vLoading();
    if(vm.isBracket) html += vBracket(vm);
    if(vm.isStandings) html += vStandings(vm);
    if(vm.isData) html += vData(vm);
    if(vm.isPredict) html += vPredict(vm);
    html += vFooter();
    app.innerHTML = html;
    attachHover();
    lastSig = phaseSig();
  }

  function attachHover(){
    var els = app.querySelectorAll('[data-hover]');
    els.forEach(function(el){
      el.addEventListener('mouseenter', function(){
        if(el.__base == null) el.__base = el.getAttribute('style') || '';
        el.setAttribute('style', el.__base + ';' + el.getAttribute('data-hover'));
      });
      el.addEventListener('mouseleave', function(){
        el.setAttribute('style', el.__base || '');
      });
    });
  }

  // ===== per-second tick: phase transitions -> full render; else patch clock + countdowns =====
  function phaseSig(){
    if(!state.ready || !DATA) return 'boot';
    var s = '';
    for(var i=0;i<DATA.schedule.length;i++){ s += phase(DATA.schedule[i]).charAt(0); }
    // 含北京日期：跨 0 点时「今日赛前预测」高亮 / isToday 才能在 1 秒内随之切换（对齐原稿每秒重算 bjToday）
    return state.tab + '|' + bjToday() + '|' + s;
  }
  function tick(){
    now = Date.now();
    if(state.ready && phaseSig() !== lastSig){ render(); return; }
    var ck = document.getElementById('wc-clock');
    if(ck) ck.textContent = fmtClock(now);
    var cds = app.querySelectorAll('.wc-cd');
    cds.forEach(function(el){
      if(el.getAttribute('data-live') === '1'){ el.textContent = '正在直播'; return; }
      el.textContent = fmtMs(Number(el.getAttribute('data-k')) - now);
    });
  }

  // ===== sync (official endpoint optional) =====
  function sync(){
    if(state.syncing) return;
    state.syncing = true; render();
    var done = function(){ state.syncing = false; state.lastSync = Date.now(); render(); };
    var ep = window.WORLDCUP_ENDPOINT;
    if(ep){ fetch(ep).then(function(r){ return r.json(); }).then(function(d){ if(d && d.schedule) DATA = d; done(); }).catch(done); }
    else setTimeout(done, 700);
  }

  // ===== 站内报告浮层(页内打开 + 返回 + 浏览器后退) =====
  var reportBox = document.getElementById('wc-report');
  function openReport(url){
    if(!isReportUrl(url)) { window.open(url, '_blank', 'noopener'); return; }
    reportBox.innerHTML =
      '<div style="position:fixed;inset:0;z-index:200;background:#F4F1EA;display:flex;flex-direction:column;">'+
        '<div style="flex:none;display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid #E4DECF;background:rgba(244,241,234,.96);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);">'+
          '<button data-report-back style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid #E4DECF;background:#FBFAF5;color:#2A2622;border-radius:9px;font-weight:600;font-size:13px;cursor:pointer;">← 返回</button>'+
          '<span style="font-size:12.5px;color:#8C8478;font-family:\'Spline Sans Mono\',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;">'+esc(decodeURIComponent(url))+'</span>'+
          '<a href="'+url+'" target="_blank" rel="noopener" style="flex:none;font-size:12px;color:#C0613B;text-decoration:none;font-weight:600;">↗ 新标签打开</a>'+
        '</div>'+
        '<iframe src="'+esc(url)+'" style="flex:1;width:100%;border:0;background:#fff;"></iframe>'+
      '</div>';
    document.body.style.overflow = 'hidden';
  }
  function closeReport(){ reportBox.innerHTML = ''; document.body.style.overflow = ''; }
  reportBox.addEventListener('click', function(e){ if(e.target.closest('[data-report-back]')) history.back(); });
  window.addEventListener('popstate', function(){ if(reportBox.innerHTML) closeReport(); });

  // ===== events (delegated, attached once) =====
  app.addEventListener('click', function(e){
    var report = e.target.closest('[data-report]');
    if(report){ e.preventDefault(); var u = report.getAttribute('data-report'); history.pushState({ wcReport:u }, ''); openReport(u); return; }
    var tabBtn = e.target.closest('[data-tab]');
    if(tabBtn){ state.tab = tabBtn.getAttribute('data-tab'); render(); return; }
    var refresh = e.target.closest('[data-action="refresh"]');
    if(refresh){ sync(); return; }
    var toggle = e.target.closest('[data-toggle]');
    if(toggle){ toggleExp(toggle.getAttribute('data-toggle')); return; }
  });

  // ===== boot =====
  function boot(){
    DATA = window.WORLDCUP_DATA; FLAGS = window.WORLDCUP_FLAGS || {}; OFF = window.WORLDCUP_VENUE_OFFSET || {}; PRED = window.WORLDCUP_PREDICTIONS || []; LEDGER = window.WORLDCUP_LEDGER || { days: [] };
    state.ready = true;
    sync();
    var n = new Date();
    var ms = (60 - n.getMinutes())*60000 - n.getSeconds()*1000 - n.getMilliseconds();
    setTimeout(function(){ sync(); setInterval(sync, 3600000); }, ms);
    setInterval(tick, 1000);
    render();
  }

  render(); // initial loading view
  if(window.WORLDCUP_DATA){ boot(); }
  else { var poll = setInterval(function(){ if(window.WORLDCUP_DATA){ clearInterval(poll); boot(); } }, 40); }

  // 兜底诊断：万一数据没就位（如某些预览/浏览器缓存了旧版本，或内联脚本被环境拦截），别无限转圈，直接说明原因
  setTimeout(function(){
    if(state.ready) return;
    var diag = '内联数据脚本(#wc-data)：' + (document.getElementById('wc-data') ? '存在' : '缺失')
      + ' · typeof window.WORLDCUP_DATA = ' + (typeof window.WORLDCUP_DATA);
    app.innerHTML = vHeader(buildVM())
      + '<div style="max-width:1340px;margin:40px auto;padding:0 24px;">'
        + '<div style="background:#FBFAF5;border:1px solid #E8E2D4;border-radius:15px;padding:22px 24px;box-shadow:0 1px 3px rgba(42,38,34,.04);">'
          + '<div style="font-family:\'Source Serif 4\',serif;font-weight:700;font-size:18px;color:#C0613B;margin-bottom:8px;">数据未能加载</div>'
          + '<div style="font-size:13px;color:#8C8478;line-height:1.7;">页面已内置完整赛程数据，正常无需联网即可显示。看到此提示多半是预览或浏览器缓存了旧版本——请<b>强制刷新</b>（Mac ⌘⇧R · Win Ctrl+F5），或直接用浏览器打开 index.html / 本地静态服务器。</div>'
          + '<div style="font-family:\'Spline Sans Mono\',monospace;font-size:11.5px;color:#a89f90;margin-top:12px;padding-top:12px;border-top:1px solid #EFEADD;">诊断 · ' + diag + '</div>'
        + '</div>'
      + '</div>'
      + vFooter();
  }, 3500);
})();
</script>
</body>
</html>
